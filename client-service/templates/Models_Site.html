<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ML Model Service</title>
    <style>
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 20px;
            overflow: hidden;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        button {
            margin: 5px;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 8px;
        }
        .btn-delete {
            background-color: #FF4444;
            color: white;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }
        .status-trained {
            color: green;
            font-weight: bold;
        }
        .button-group {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>ML Model Service API</h2>
        
        <table id="modelTable">
            <thead>
                <tr><th>UID</th><th>Имя файла</th><th>Статус</th><th>Действия</th></tr>
            </thead>
            <tbody></tbody>
        </table>
        
        <div class="button-group">
            <button onclick="uploadModel()"> Загрузить модель</button>
            <button onclick="trainModel()"> Тренировать модель</button>
        </div>
        <input type="file" id="fileInput" accept=".pkl,.pt,.h5,.onnx,.pickle" style="display:none">
    </div>

    <script>
        let models = [
            {uid:"a1b2c3d4-e5f6-7890-abcd-e1234567890", filename:"credit_model_v1.pkl", status:"Обучена"},
            {uid:"b2c3d4e5-f6a7-8901-bcde-f12345678901", filename:"credit_model_v2.pkl", status:"Обучена"},
            {uid:"c3d4e5f6-a7b8-9012-cdef-123456789012", filename:"risk_assessment_model.pkl", status:"Обучена"}
        ];
        
        function render() {
            let html = '';
            for(let m of models) {
                html += `<tr>
                    <td>${m.uid.slice(0,8)}...</td>
                    <td>${m.filename}</td>
                    <td class="status-trained">${m.status}</td>
                    <td>
                        <button onclick="download('${m.filename}')"> Скачать</button>
                        <button class="btn-delete" onclick="deleteRow('${m.uid}')"> Удалить</button>
                    </td>
                </tr>`;
            }
            document.querySelector('#modelTable tbody').innerHTML = html;
        }
        
        function download(f) { alert(`Скачивание: ${f}`); }
        function deleteRow(uid) {
            const model = models.find(m => m.uid === uid);
            if (!model) return;
            if (confirm(`Вы уверены, что хотите удалить модель "${model.filename}"?`)) {
                models = models.filter(m => m.uid !== uid);
                render();
                alert(`Модель "${model.filename}" успешно удалена!`);
            }
        }

        function uploadModel() {
            document.getElementById('fileInput').click(); //Диалоговое окно файла
        }
        document.getElementById('fileInput').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;
            models.push({
                uid: Date.now() + '-' + Math.random().toString(36).substr(2, 9),
                filename: file.name,
                status: "Загружена",
                size: (file.size / 1024).toFixed(2) + ' KB' });
            render();
            alert(`Файл "${file.name}" успешно загружен!`);
            event.target.value = '';
        });


        function trainModel() {
            let msg = "Выберите модель:\n";
            models.forEach((m,i)=>msg+=`${i+1}. ${m.filename}\n`);
            let n = prompt(msg);
            if(n && models[n-1]) {
                models[n-1].status = "В обучении";
                render();
                setTimeout(()=>{ models[n-1].status = "Обучена"; render(); alert("Готово!"); }, 2000);
            }
        }
        render();
    </script>
</body>
</html>
