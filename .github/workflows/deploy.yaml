name: Model-Creation

on:
  push:
    branches:
      - main

jobs:
  Test-create-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          cd ./trainer-service/src/ml_pipeline/
          python -m pip install --upgrade pip
          pip install .
          cd ..
      
      - name: Run training pipeline
        run: |
          mkdir dist
          touch dist/model.pkl
          touch dist/metrics.txt
          python -c '
          from trainer-service/src/ml_pipeline.pipeline_manager import (
              TrainingPipeline,
          )

          if __name__ == "__main__":
              with open("loan_data.csv", "rb") as file:
                  train_csv_bytes = file.read()

              trainer = TrainingPipeline(train_csv_bytes)
              trainer.run_pipeline()

              model_bytes = trainer.get_model_bytes()
              metrics = trainer.get_metrics()

              with open("dist/model.pkl", "wb") as model_file:
                  file.write(model_file)

              with open("dist/metrics.txt", "w") as metrics_file:
                  file.write(metrics_file)
          '

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-assets
          path: dist/
