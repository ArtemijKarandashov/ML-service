services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs:/etc/nginx/certs:ro
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
    labels:
      - "com.github.jrcs.letsencrypt_nginx_proxy_companion.nginx_proxy"
    restart: unless-stopped

  acme-companion:
    image: nginxproxy/acme-companion:latest
    container_name: nginx-proxy-acme
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/etc/nginx/certs:rw
      - vhost:/etc/nginx/vhost.d:rw
      - html:/usr/share/nginx/html:rw
      - acme:/etc/acme.sh
    environment:
      - DEFAULT_EMAIL=artemij.karandashov@yandex.ru
    depends_on:
      - nginx-proxy
    restart: unless-stopped
  
  # PLACEHOLDER. Update when frontend is done
  client:
    image: nginx
    volumes:
   - templates:/etc/nginx/templates
    expose:
      - "80"
    environment:
      - VIRTUAL_HOST=smth.ru
      - LETSENCRYPT_HOST=smth.ru
    restart: always

  client-service:
    build:
      context: ./client-service
      dockerfile: Dockerfile
    container_name: client-service
    ports:
      - "8080:8080"
    environment:
      - CLIENT_SERVICE_PORT=8080
      - STORAGE_SERVICE_API=http://storage-service:8081
      - TRAINER_SERVICE_API=http://predictor-service:8082
      - PREDICTOR_SERVICE_API=http://predictor-service:8083
    depends_on:
      - storage-service
      - predictor-service
      - trainer-service
    networks:
      - app-network
    restart: unless-stopped

  storage-service:
    build:
      context: ./storage-service
      dockerfile: Dockerfile
    container_name: storage-service
    ports:
      - "8001:8001"
    environment:
      - UPLOAD_DIR=/data/uploads
      - SQLITE_URL=sqlite+aiosqlite:///data/storedfiles.db
      - STORAGE_SERVICE_PORT=8081
    volumes:
      - data:/data               
    networks:
      - app-network
    restart: unless-stopped

  trainer-service:
    build:
      context: ./trainer-service
      dockerfile: Dockerfile
    container_name: trainer-service
    ports:
      - "8082:8082"
    environment:
      - TRAINER_SERVICE_PORT=8082
      - STORAGE_SERVICE_API=http://storage-service:8081
    depends_on:
      - storage-service
    networks:
      - app-network
    restart: unless-stopped
    # limits
    # deploy:
    #   resources:
    #     limits:
    #       memory: 4G

  # predictor-service:
  #   build:
  #     context: ./predictor-service
  #     dockerfile: Dockerfile
  #   container_name: predictor-service
  #   ports:
  #     - "8083:8083"
  #   environment:
  #     - STORAGE_SERVICE_API=http://storage-service:8081
  #   depends_on:
  #     - storage-service
  #   networks:
  #     - app-network
  #   restart: unless-stopped

volumes:
  templates:
  certs:
  vhost:
  html:
  acme:

networks:
  app-network:
    driver: bridge